app-id: com.moonlight_stream.Moonlight
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
command: moonlight
rename-icon: moonlight
finish-args:
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --share=ipc
  - --socket=pulseaudio
  - --device=all
  - --talk-name=org.freedesktop.ScreenSaver
  - --env=IGNORE_RFI_LATENCY_BUG=1
  - --env=QT_QUICK_CONTROLS_STYLE=Material
  # - --env=LIBVA_DRIVER_NAME=
  # - --unset-env=LIBVA_DRIVER_NAME
  # - --env=LIBVA_DRIVERS_PATH=
  # - --unset-env=LIBVA_DRIVERS_PATH
  - --filesystem=xdg-run/gamescope-0
  - --filesystem=host-os:ro
cleanup:
  - /include
  - '*.a'
  - /lib/pkgconfig
  - /share/ffmpeg

modules:
  - name: libdrm
    buildsystem: meson
    sources:
      - type: git
        url: https://gitlab.freedesktop.org/mesa/drm.git
        tag: libdrm-2.4.131

  - name: libplacebo
    buildsystem: meson
    build-options:
      config-opts:
        - -Ddemos=false
        - -Dvulkan=enabled
        - -Dopengl=disabled
        - -Dshaderc=enabled
    sources:
      - type: git
        url: https://github.com/haasn/libplacebo.git
        # tag: v7.351.0 not working
        commit: 1dcaea8b601aa969ffd5bfa70088957ce3eaa273
      #- type: patch
      #  path: 0001-Vulkan-Don-t-try-to-reuse-old-swapchain.patch

  - name: libdecor
    buildsystem: meson
    build-options:
      config-opts:
        - -Ddemo=false
    sources:
      - type: git
        url: https://gitlab.freedesktop.org/libdecor/libdecor.git
        tag: 0.2.5

  - name: SDL2
    build-options:
      config-opts:
        - --prefix=/app
        - --disable-arts
        - --disable-esd
        - --disable-nas
        # - --disable-alsa
        - --disable-oss
        - --disable-sndio
        - --disable-rpath
        - --disable-static
        - --disable-hidapi
    sources:
      - type: git
        url: https://github.com/libsdl-org/SDL.git
        tag: release-2.32.10

  # - name: ffnvcodec
  #   no-autogen: true
  #   make-install-args:
  #     - PREFIX=/app
  #   sources:
  #     - type: git
  #       url: https://git.videolan.org/git/ffmpeg/nv-codec-headers.git
  #       tag: n11.0.10.3
  #       commit: 625b3199e94db49e3bb0dc797fc4cffbf7115d81

  - name: dav1d
    buildsystem: meson
    build-options:
      config-opts:
        - -Denable_tools=false
        - -Denable_tests=false
    sources:
      - type: git
        url: https://code.videolan.org/videolan/dav1d.git
        tag: 1.5.3

  - name: ffmpeg
    build-options:
      config-opts:
        - --disable-stripping
        - --enable-pic
        - --enable-shared
        - --disable-static
        - --disable-all
        - --enable-avcodec
        - --enable-avformat
        - --enable-swscale
        - --enable-decoder=h264
        - --enable-decoder=hevc
        - --enable-decoder=av1
        # - --enable-decoder=h264_v4l2m2m
        # - --enable-decoder=hevc_v4l2m2m
        # - --enable-hwaccel=h264_vaapi
        # - --enable-hwaccel=hevc_vaapi
        # - --enable-hwaccel=av1_vaapi
        # - --enable-hwaccel=h264_vdpau
        # - --enable-hwaccel=hevc_vdpau
        # - --enable-hwaccel=av1_vdpau
        # - --enable-nvdec
        # - --enable-hwaccel=h264_nvdec
        # - --enable-hwaccel=hevc_nvdec
        # - --enable-hwaccel=av1_nvdec
        - --enable-libdrm
        - --enable-hwaccel=h264_vulkan
        - --enable-hwaccel=hevc_vulkan
        - --enable-hwaccel=av1_vulkan
        - --enable-libdav1d
    sources:
      - type: git
        url: https://github.com/FFmpeg/FFmpeg.git
        tag: n8.0.1

  - name: gamescope-wsi
    buildsystem: simple
    build-commands:
      - install -Dm755 VkLayer_FROG_gamescope_wsi.x86_64.json /app/share/vulkan/implicit_layer.d/VkLayer_FROG_gamescope_wsi.x86_64.json
    only-arches:
      - x86_64
    sources:
      - type: file
        path: VkLayer_FROG_gamescope_wsi.x86_64.json

  - name: moonlight
    buildsystem: qmake
    build-options:
      config-opts:
        - QMAKE_RPATHDIR=/app/lib64:/app/lib
        - CONFIG+=disable-libva   # disable VAAPI support
        - QMAKE_CXXFLAGS+=-DDISPLAY_BITRATE  # enable bitrate stats in stream OSD
      env:
        PKG_CONFIG_PATH: /app/lib64/pkgconfig:/app/lib/pkgconfig:${PKG_CONFIG_PATH}
    sources:
      - type: git
        url: https://github.com/mspeedo/moonlight-qt.git
        branch: vrr
        disable-shallow-clone: true
