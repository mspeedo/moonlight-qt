app-id: com.moonlight_stream.Moonlight
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: moonlight
rename-icon: moonlight
finish-args:
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --share=ipc
  - --socket=pulseaudio
  - --device=all
  - --talk-name=org.freedesktop.ScreenSaver
  - --env=IGNORE_RFI_LATENCY_BUG=1
  - --env=QT_QUICK_CONTROLS_STYLE=Material
  # - --env=LIBVA_DRIVER_NAME=
  # - --unset-env=LIBVA_DRIVER_NAME
  # - --env=LIBVA_DRIVERS_PATH=
  # - --unset-env=LIBVA_DRIVERS_PATH
  - --filesystem=xdg-run/gamescope-0
  - --filesystem=host-os:ro
cleanup:
  - '*.a'
  - /include
  - /lib/pkgconfig
  - /share/ffmpeg

modules:
  - name: libplacebo
    buildsystem: meson
    build-options:
      config-opts:
        - -Ddemos=false
        - -Dvulkan=enabled
        - -Dopengl=disabled
        - -Dshaderc=enabled
    sources:
      - type: git
        url: https://github.com/haasn/libplacebo.git
        # tag: v7.351.0 not working
        commit: 1dcaea8b601aa969ffd5bfa70088957ce3eaa273

  - name: libdecor
    buildsystem: meson
    build-options:
      config-opts:
        - -Ddemo=false
    sources:
      - type: git
        url: https://gitlab.freedesktop.org/libdecor/libdecor.git
        tag: 0.2.5

  - name: SDL3
    buildsystem: cmake-ninja
    builddir: true
    build-options:
      config-opts:
        - -DSDL_ALSA=OFF
        - -DSDL_RPATH=OFF
        - -DSDL_KMSDRM=OFF
        - -DSDL_INSTALL_DOCS=OFF
        - -DSDL_TEST_LIBRARY=OFF
    sources:
      - type: git
        url: https://github.com/libsdl-org/SDL.git
        # branch: release-3.4.x
        commit: 3cf15dc222de5ed8d12cc79556c4c18daecb3278

  - name: SDL2-compat
    buildsystem: cmake-ninja
    builddir: true
    build-options:
      config-opts:
        - -DSDL2COMPAT_TESTS=OFF
    sources:
      - type: git
        url: https://github.com/libsdl-org/sdl2-compat.git
        commit: 1c8ece4de9db96d01f99296c26a87a4cabb72f54

  - name: SDL2_ttf
    build-options:
      config-opts:
        - --disable-rpath
        - --disable-static
    sources:
      - type: archive
        url: https://github.com/libsdl-org/SDL_ttf/releases/download/release-2.22.0/SDL2_ttf-2.22.0.tar.gz
        sha256: d48cbd1ce475b9e178206bf3b72d56b66d84d44f64ac05803328396234d67723

  - name: dav1d
    buildsystem: meson
    build-options:
      config-opts:
        - -Denable_tools=false
        - -Denable_tests=false
    sources:
      - type: git
        url: https://code.videolan.org/videolan/dav1d.git
        tag: 1.5.3

  - name: ffmpeg
    build-options:
      config-opts:
        - --disable-stripping
        - --enable-pic
        - --enable-shared
        - --disable-static
        - --disable-all
        - --enable-avcodec
        - --enable-avformat
        - --enable-swscale
        - --enable-decoder=h264
        - --enable-decoder=hevc
        - --enable-decoder=av1
        # - --enable-decoder=h264_v4l2m2m
        # - --enable-decoder=hevc_v4l2m2m
        # - --enable-hwaccel=h264_vaapi
        # - --enable-hwaccel=hevc_vaapi
        # - --enable-hwaccel=av1_vaapi
        # - --enable-hwaccel=h264_vdpau
        # - --enable-hwaccel=hevc_vdpau
        # - --enable-hwaccel=av1_vdpau
        # - --enable-nvdec
        # - --enable-hwaccel=h264_nvdec
        # - --enable-hwaccel=hevc_nvdec
        # - --enable-hwaccel=av1_nvdec
        - --enable-libdrm
        - --enable-hwaccel=h264_vulkan
        - --enable-hwaccel=hevc_vulkan
        - --enable-hwaccel=av1_vulkan
        - --enable-libdav1d
    sources:
      - type: git
        url: https://github.com/cgutman/FFmpeg.git
        # branch: moonlight_8.0.1_r2
        commit: 188067dedb120241a5c473c7178fa28233566f12

  - name: gamescope-wsi
    buildsystem: simple
    build-commands:
      - install -Dm755 VkLayer_FROG_gamescope_wsi.x86_64.json /app/share/vulkan/implicit_layer.d/VkLayer_FROG_gamescope_wsi.x86_64.json
    only-arches:
      - x86_64
    sources:
      - type: file
        path: VkLayer_FROG_gamescope_wsi.x86_64.json

  - name: moonlight
    buildsystem: qmake
    build-options:
      config-opts:
        - QMAKE_RPATHDIR=/app/lib64:/app/lib
        - CONFIG+=disable-cuda
        - CONFIG+=disable-libdrm
        - CONFIG+=disable-libva   # disable VAAPI support
        - QMAKE_CXXFLAGS+=-DDISPLAY_BITRATE  # enable bitrate stats in stream OSD
      env:
        PKG_CONFIG_PATH: /app/lib64/pkgconfig:/app/lib/pkgconfig:${PKG_CONFIG_PATH}
    sources:
      - type: git
        url: https://github.com/mspeedo/moonlight-qt.git
        branch: vrr
        disable-shallow-clone: true
